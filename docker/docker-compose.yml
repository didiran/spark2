# Spark-Kafka ML Training Pipeline - Docker Compose
# Full infrastructure with UI tools, monitoring, and auto-initialization

services:
  # ===========================================================
  # Zookeeper
  # ===========================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: pipeline-zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ===========================================================
  # Kafka UI #1: Kafdrop (clean UI)
  # ===========================================================
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: pipeline-kafdrop
    hostname: kafdrop
    depends_on:
      kafka-1:
        condition: service_started    # не healthy, а просто started
      kafka-2:
        condition: service_started
      kafka-3:
        condition: service_started
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka-1:29092,kafka-2:29093,kafka-3:29094
      JVM_OPTS: "-Xms32M -Xmx64M"
      SERVER_SERVLET_CONTEXTPATH: "/"
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================
  # Kafka UI #2: AKHQ (formerly KafkaHQ) - advanced UI
  # ===========================================================
  akhq:
    image: tchiotludo/akhq:latest
    container_name: pipeline-akhq
    hostname: akhq
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            docker-kafka:
              properties:
                bootstrap.servers: "kafka-1:29092,kafka-2:29093,kafka-3:29094"
              schema-registry:
                url: "http://schema-registry:8081"
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================
  # Kafka UI #3: Redpanda Console (modern UI)
  # ===========================================================
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: pipeline-redpanda
    hostname: redpanda
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    ports:
      - "8086:8080"
    environment:
      KAFKA_BROKERS: "kafka-1:29092,kafka-2:29093,kafka-3:29094"
      SCHEMA_REGISTRY_ENABLED: "true"
      SCHEMA_REGISTRY_URLS: "http://schema-registry:8081"
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================
  # Schema Registry
  # ===========================================================
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.3
    container_name: pipeline-schema-registry
    hostname: schema-registry
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29093,kafka-3:29094
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ===========================================================
  # Spark Master
  # ===========================================================
  spark-master:
    image: apache/spark:3.5.1
    container_name: pipeline-spark-master
    hostname: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    volumes:
      - spark-data:/data
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ===========================================================
  # Spark Worker
  # ===========================================================
  spark-worker:
    image: apache/spark:3.5.1
    container_name: pipeline-spark-worker
    hostname: spark-worker
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8082:8081"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      - SPARK_MODE=worker
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    volumes:
      - spark-data:/data
    networks:
      - pipeline-network

  # ===========================================================
  # PostgreSQL with auto-initialization
  # ===========================================================
  postgres:
    image: postgres:16-alpine
    container_name: pipeline-postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ml_pipeline
      POSTGRES_USER: pipeline_user
      POSTGRES_PASSWORD: pipeline_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline_user -d ml_pipeline"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================
  # MLflow - исправленная версия
  # ===========================================================
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: pipeline-mlflow
    hostname: mlflow
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://pipeline_user:pipeline_pass@postgres:5432/ml_pipeline
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://pipeline_user:pipeline_pass@postgres:5432/ml_pipeline
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]  # ← поменял /health на /
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
  # ===========================================================
  # Kafka Topic Initializer (автоматическое создание топиков)
  # ===========================================================
  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    container_name: pipeline-kafka-init
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for Kafka cluster to be ready...'
      sleep 15
      echo 'Creating topics with replication-factor=3...'
      kafka-topics --create --if-not-exists --topic ml-training-data \
        --partitions 3 --replication-factor 3 --bootstrap-server kafka-1:29092
      kafka-topics --create --if-not-exists --topic fraud-transactions \
        --partitions 3 --replication-factor 3 --bootstrap-server kafka-1:29092
      kafka-topics --create --if-not-exists --topic iot-sensors \
        --partitions 2 --replication-factor 3 --bootstrap-server kafka-1:29092
      kafka-topics --create --if-not-exists --topic financial-trades \
        --partitions 4 --replication-factor 3 --bootstrap-server kafka-1:29092
      echo 'Topics created:'
      kafka-topics --list --bootstrap-server kafka-1:29092
      echo 'Initialization complete.'
      "
    networks:
      - pipeline-network
    # ===========================================================
  # Kafka Cluster (3 брокера)
  # ===========================================================
  kafka-1:
    image: confluentinc/cp-kafka:7.5.3
    container_name: pipeline-kafka-1
    hostname: kafka-1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 20s
      timeout: 15s
      retries: 5
      start_period: 30s
  kafka-2:
    image: confluentinc/cp-kafka:7.5.3
    container_name: pipeline-kafka-2
    hostname: kafka-2
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9093"
      - "29093:29093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29093,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9093", "--list"]
      interval: 20s
      timeout: 15s
      retries: 5
      start_period: 30s
  kafka-3:
    image: confluentinc/cp-kafka:7.5.3
    container_name: pipeline-kafka-3
    hostname: kafka-3
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9094:9094"
      - "29094:29094"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:29094,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9094", "--list"]
      interval: 20s
      timeout: 15s
      retries: 5
      start_period: 30s
  # ===========================================================
  # Prometheus - metrics collection
  # ===========================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: pipeline-prometheus
    hostname: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - pipeline-network
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
      - spark-master
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================
  # Grafana - visualization
  # ===========================================================
  grafana:
    image: grafana/grafana:latest
    container_name: pipeline-grafana
    hostname: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - pipeline-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================
  # JMX Exporter for Kafka metrics 
  # ===========================================================
  jmx-exporter:
    image: bitnami/jmx-exporter:latest
    container_name: pipeline-jmx-exporter
    hostname: jmx-exporter
    ports:
      - "5556:5556"
    command:
      - '5556'
      - '/opt/bitnami/jmx-exporter/conf/config.yml'
    volumes:
      - ./jmx-exporter/kafka.yml:/opt/bitnami/jmx-exporter/conf/config.yml:ro
    environment:
      KAFKA_JMX_HOST: kafka-1
      KAFKA_JMX_PORT: 9997
    networks:
      - pipeline-network
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3

  # ===========================================================
  # PostgreSQL Exporter
  # ===========================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: pipeline-postgres-exporter
    hostname: postgres-exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://pipeline_user:pipeline_pass@postgres:5432/ml_pipeline?sslmode=disable"
    networks:
      - pipeline-network
    depends_on:
      - postgres

  # ===========================================================
  # Blackbox Exporter - endpoint monitoring
  # ===========================================================
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: pipeline-blackbox-exporter
    hostname: blackbox-exporter
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox-exporter/blackbox.yml:/etc/blackbox_exporter/config.yml
    networks:
      - pipeline-network
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'

  # ===========================================================
  # Swagger UI - API documentation
  # ===========================================================
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: pipeline-swagger
    hostname: swagger
    ports:
      - "8888:8080"
    environment:
      API_URL: http://localhost:8888/openapi.json
      SWAGGER_JSON: /openapi.json
    volumes:
      - ./swagger/openapi.json:/openapi.json
    networks:
      - pipeline-network
  # ===========================================================
  # Elasticsearch - хранение логов и метрик
  # ===========================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: pipeline-elasticsearch
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===========================================================
  # Kibana - визуализация логов
  # ===========================================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: pipeline-kibana
    hostname: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      
   # ===========================================================
  # Kibana Auto Setup (рабочая версия с правильным pattern)
  # ===========================================================
  kibana-setup:
    image: curlimages/curl:latest
    container_name: pipeline-kibana-setup
    depends_on:
      kibana:
        condition: service_healthy
    networks:
      - pipeline-network
    entrypoint: /bin/sh
    command: |
      -c '
        echo "=== Kibana Auto Setup ==="
        echo "Waiting for Kibana to be fully ready..."
        sleep 30
        
        echo "Checking if data view with correct pattern exists..."
        CURRENT=$(curl -s "http://kibana:5601/api/data_views")
        
        if echo "$CURRENT" | grep -q "pipeline-logs-\*"; then
          echo "✓ Data view with pattern pipeline-logs-* already exists"
        else
          echo "Creating data view with pattern pipeline-logs-*..."
          
          curl -X POST "http://kibana:5601/api/data_views" \
            -H "kbn-xsrf: true" \
            -H "Content-Type: application/json" \
            -d "{
              \"data_view\": {
                \"title\": \"pipeline-logs-*\",
                \"name\": \"pipeline-logs\",
                \"timeFieldName\": \"@timestamp\"
              }
            }"
          
          echo ""
          echo "✓ Data view created with pattern pipeline-logs-*"
        fi
        
        echo ""
        echo "=== Current data views ==="
        curl -s "http://kibana:5601/api/data_views"
        echo ""
        echo "=== Setup complete! ==="
      '
    restart: "no"
  # ===========================================================
  # Filebeat - сбор логов из контейнеров
  # ===========================================================
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: pipeline-filebeat
    hostname: filebeat
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - pipeline-network
    command: ["filebeat", "-e", "-strict.perms=false"]
    # ===========================================================
  # ML Pipeline Application
  # ===========================================================
  ml-pipeline:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pipeline-app
    hostname: ml-pipeline
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      postgres:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    environment:
      PIPELINE_ENV: production
      LOG_LEVEL: INFO
      # ИСПРАВЛЕНО: используем правильные имена брокеров
      KAFKA_BOOTSTRAP_SERVERS: "kafka-1:29092,kafka-2:29093,kafka-3:29094"
      # Дополнительные настройки Kafka
      KAFKA_CONSUMER_GROUP_ID: "ml-pipeline-consumer"
      KAFKA_AUTO_OFFSET_RESET: "earliest"
      SPARK_MASTER_URL: spark://spark-master:7077
      MLFLOW_TRACKING_URI: http://mlflow:5000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ml_pipeline
      POSTGRES_USER: pipeline_user
      POSTGRES_PASSWORD: pipeline_pass
    volumes:
      - pipeline-data:/app/data
      - pipeline-results:/app/demo_results
      - pipeline-features:/app/demo_feature_store
      - pipeline-logs:/app/logs
    networks:
      - pipeline-network
    restart: on-failure
    # ===========================================================
  # pgAdmin - PostgreSQL Admin UI (автонастройка)
  # ===========================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pipeline-pgadmin
    hostname: pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - pipeline-network
    entrypoint: |
      sh -c "
      mkdir -p /pgadmin4/
      if [ -f /pgadmin4/servers.json ]; then
        echo 'Servers already configured'
      else
        cp /pgadmin/servers.json /pgadmin4/servers.json || echo 'No servers.json to copy'
      fi
      /entrypoint.sh
      "
  # ===========================================================
  # Web API для отправки транзакций
  # ===========================================================
  web-api:
    build:
      context: ../web_app
      dockerfile: Dockerfile.web
    container_name: pipeline-web-api
    hostname: web-api
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29093,kafka-3:29094
      DATABASE_URL: postgresql://pipeline_user:pipeline_pass@postgres:5432/transactions_db
      SECRET_KEY: your-super-secret-key-change-in-production-2024
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
    networks:
      - pipeline-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# ===========================================================
# Volumes
# ===========================================================
volumes:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
  zookeeper-data:
  zookeeper-logs:
  spark-data:
  postgres-data:
  mlflow-artifacts:
  prometheus-data:
  grafana-data:
  pipeline-data:
